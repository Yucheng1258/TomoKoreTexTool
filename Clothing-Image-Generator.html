  let dragStartTx = 0;
  let dragStartTy = 0;
  let filterBrightness = 100;
  let filterContrast = 100;
  let filterSaturation = 100;
  let toastTimer = null;

  function cfg() { return MODE_CONFIGS[currentMode]; }
  function currentRegionKeys() { return cfg().regionKeys; }
  function getActiveLabel(regionKey = activeRegion) { return cfg().activeLabels[regionKey] || regionKey; }
  function getActiveState() { return statesByMode[currentMode][activeRegion]; }
  function getActiveArea() { return getRegionDef(activeRegion).bounds; }
  function getFilterString() { return `brightness(${filterBrightness}%) contrast(${filterContrast}%) saturate(${filterSaturation}%)`; }
  function currentFullName() { return `${CATEGORY_CONFIGS[cfg().category].label}-${cfg().itemName}`; }
  function getRegionDefKey(regionKey) {
    if (currentMode === 'longSleeveTop') {
      if (regionKey === 'blue') return 'blueLong';
      if (regionKey === 'purple') return 'purpleLong';
    }
    if (currentMode === 'sleevelessDress') {
      if (regionKey === 'red') return 'redDress';
      if (regionKey === 'green') return 'greenDress';
    }
    if (currentMode === 'shortSleeveDress') {
      if (regionKey === 'red') return 'redShortDress';
      if (regionKey === 'green') return 'greenShortDress';
      if (regionKey === 'blue') return 'blueShortDress';
      if (regionKey === 'purple') return 'purpleShortDress';
    }
    if (currentMode === 'longSleeveDress') {
      if (regionKey === 'red') return 'redLongDress';
      if (regionKey === 'green') return 'greenLongDress';
      if (regionKey === 'blue') return 'blueLongDress';
      if (regionKey === 'purple') return 'purpleLongDress';
    }
    if (currentMode === 'robe') {
      if (regionKey === 'red') return 'redRobe';
      if (regionKey === 'green') return 'greenRobe';
      if (regionKey === 'blue') return 'blueRobe';
      if (regionKey === 'purple') return 'purpleRobe';
    }
    if (currentMode === 'gown') {
      if (regionKey === 'red') return 'redGown';
      if (regionKey === 'green') return 'greenGown';
      if (regionKey === 'blue') return 'blueGown';
      if (regionKey === 'purple') return 'purpleGown';
    }
    if (currentMode === 'shortSkirt') {
      if (regionKey === 'red') return 'redShortSkirt';
      if (regionKey === 'green') return 'greenShortSkirt';
    }
    if (currentMode === 'longSkirt') {
      if (regionKey === 'red') return 'redLongSkirt';
      if (regionKey === 'green') return 'greenLongSkirt';
    }
    if (currentMode === 'shorts') {
      if (regionKey === 'red') return 'redShorts';
      if (regionKey === 'green') return 'greenShorts';
    }
    if (currentMode === 'longBottom') {
      if (regionKey === 'red') return 'redLongBottom';
      if (regionKey === 'green') return 'greenLongBottom';
    }
    if (currentMode === 'baseballCap') {
      if (regionKey === 'red') return 'redBaseballCap';
      if (regionKey === 'green') return 'greenBaseballCap';
      if (regionKey === 'blue') return 'blueBaseballCap';
      if (regionKey === 'purple') return 'purpleBaseballCap';
    }
    if (currentMode === 'knitCap') {
      if (regionKey === 'red') return 'redKnitCap';
      if (regionKey === 'green') return 'greenKnitCap';
    }
    if (currentMode === 'topHat') {
      if (regionKey === 'red') return 'redTopHat';
      if (regionKey === 'green') return 'greenTopHat';
      if (regionKey === 'blue') return 'blueTopHat';
    }
    return regionKey;
  }
  function getRegionDef(regionKey) { return REGION_DEFS[getRegionDefKey(regionKey)]; }

  function showToast(message) {
    clearTimeout(toastTimer);
    toast.textContent = message;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function pointInRegion(x, y, regionKey) {
    const px = Math.floor(x);
    const py = Math.floor(y);
    if (px < 0 || py < 0 || px >= CANVAS_SIZE || py >= CANVAS_SIZE) return false;
    for (const [y0, y1, segments] of getRegionDef(regionKey).groups) {
      if (py < y0 || py > y1) continue;
      return segments.some(([x0, x1]) => px >= x0 && px < x1);
    }
    return false;
  }

  function regionAt(x, y) {
    for (const regionKey of currentRegionKeys()) {
      if (pointInRegion(x, y, regionKey)) return regionKey;
    }
    return null;
  }

  function fitScale(img, area) { return Math.min(area.w / img.naturalWidth, area.h / img.naturalHeight); }
  function fillScale(img, area) { return Math.max(area.w / img.naturalWidth, area.h / img.naturalHeight); }

  function setStateImage(state, img, area) {
    state.image = img;
    state.hasImage = true;
    state.fitScale = fitScale(img, area);
    state.fillScale = fillScale(img, area);
    state.scale = state.fitScale;
    state.tx = area.x + (area.w - img.naturalWidth * state.scale) / 2;
    state.ty = area.y + (area.h - img.naturalHeight * state.scale) / 2;
    clampState(state, area);
  }

  function clampState(state, area) {
    if (!state.image || !state.hasImage) return;
    const drawW = state.image.naturalWidth * state.scale;
    const drawH = state.image.naturalHeight * state.scale;
    const margin = 0.1;
    if (drawW > area.w * 0.3 && drawH > area.h * 0.3) {
      state.tx = Math.max(area.x - drawW * (1 - margin), Math.min(area.x + area.w - drawW * margin, state.tx));
      state.ty = Math.max(area.y - drawH * (1 - margin), Math.min(area.y + area.h - drawH * margin, state.ty));
    }
  }

  function drawMaskedFill(ctx, regionKey) {
    if (cfg().useBaseFill === false) return;
    workCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    workCtx.globalCompositeOperation = 'source-over';
    workCtx.fillStyle = modeColors[currentMode][regionKey];
    workCtx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    workCtx.globalCompositeOperation = 'destination-in';
    workCtx.drawImage(masks[getRegionDefKey(regionKey)], 0, 0);
    workCtx.globalCompositeOperation = 'source-over';
    ctx.drawImage(workCanvas, 0, 0);
  }

  function drawMaskedImage(ctx, regionKey, state, applyFilter) {
    if (!state.image || !state.hasImage) return;
    workCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    workCtx.globalCompositeOperation = 'source-over';
    workCtx.imageSmoothingEnabled = true;
    workCtx.imageSmoothingQuality = 'high';
    workCtx.filter = applyFilter ? getFilterString() : 'none';
    workCtx.drawImage(state.image, state.tx, state.ty, state.image.naturalWidth * state.scale, state.image.naturalHeight * state.scale);
    workCtx.filter = 'none';
    workCtx.globalCompositeOperation = 'destination-in';
    workCtx.drawImage(masks[getRegionDefKey(regionKey)], 0, 0);
    workCtx.globalCompositeOperation = 'source-over';
    ctx.drawImage(workCanvas, 0, 0);
  }

  function drawOverlays(ctx) {
    currentRegionKeys().forEach(regionKey => {
      const bounds = getRegionDef(regionKey).bounds;
      ctx.save();
      ctx.strokeStyle = regionKey === activeRegion ? 'rgba(76,110,245,.9)' : 'rgba(30,36,51,.18)';
      ctx.lineWidth = regionKey === activeRegion ? 1.5 : 1;
      ctx.setLineDash(regionKey === activeRegion ? [5, 3] : [3, 4]);
      ctx.strokeRect(bounds.x + 0.5, bounds.y + 0.5, bounds.w - 1, bounds.h - 1);
      ctx.restore();
    });
  }

  function renderToContext(ctx, applyFilter = true, showOverlay = true) {
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    currentRegionKeys().forEach(regionKey => drawMaskedFill(ctx, regionKey));
    currentRegionKeys().forEach(regionKey => drawMaskedImage(ctx, regionKey, statesByMode[currentMode][regionKey], applyFilter));
    if (showOverlay) drawOverlays(ctx);
  }

  function ensureActiveRegionValid() {
    if (!currentRegionKeys().includes(activeRegion)) {
      activeRegion = currentRegionKeys()[0];
    }
  }

  function renderCategorySwitch() {
    categorySwitch.innerHTML = '';
    Object.entries(CATEGORY_CONFIGS).forEach(([categoryKey, category]) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `switch-option${currentCategory === categoryKey ? ' active' : ''}`;
      button.textContent = category.label;
      button.addEventListener('click', () => {
        if (categoryKey === currentCategory) return;
        currentCategory = categoryKey;
        currentMode = selectedStyleByCategory[categoryKey] || category.styles[0];
        ensureActiveRegionValid();
        updateAll();
        showToast(`已切换到${CATEGORY_CONFIGS[currentCategory].label}`);
      });
      categorySwitch.appendChild(button);
    });
  }

  function renderStyleSwitch() {
    styleSwitch.innerHTML = '';
    CATEGORY_CONFIGS[currentCategory].styles.forEach(modeId => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `switch-option${currentMode === modeId ? ' active' : ''}`;
      button.textContent = MODE_CONFIGS[modeId].itemName;
      button.addEventListener('click', () => {
        if (modeId === currentMode) return;
        currentMode = modeId;
        selectedStyleByCategory[currentCategory] = modeId;
        ensureActiveRegionValid();
        updateAll();
        showToast(`已切换为${currentFullName()}`);
      });
      styleSwitch.appendChild(button);
    });
  }

  function updateUI() {
    ensureActiveRegionValid();
    renderCategorySwitch();
    renderStyleSwitch();
    document.title = '服装图片生成工具 · 256×256 PNG';
    toolTitle.textContent = '《朋友收集梦想生活》服装图片生成工具';
    if (subtitle) subtitle.textContent = '点击不同区域导入图片 → 调整显示区域 → 导出 256×256 PNG';
    editPanelHint.textContent = cfg().editHint;
    bottomHintText.textContent = cfg().bottomHint;
    const hideColorPanel = !!cfg().hideColorPanel;
    bookGroup.style.display = hideColorPanel ? 'none' : '';
    controlGrid.classList.toggle('simple-tee-mode', hideColorPanel);
    bookGroupTitle.textContent = cfg().colorPanelTitle;
    bookActiveHint.textContent = `当前编辑：${getActiveLabel()}`;
    bookColorStack.classList.toggle('short-sleeve', !hideColorPanel && currentRegionKeys().length > 2 && currentMode !== 'topHat');
    bookColorStack.classList.toggle('top-hat-vertical', !hideColorPanel && currentMode === 'topHat');
    Object.keys(colorInputs).forEach(regionKey => {
      const isVisible = !hideColorPanel && currentRegionKeys().includes(regionKey);
      colorFields[regionKey].style.display = isVisible ? 'flex' : 'none';
      colorLabels[regionKey].textContent = cfg().colorLabels[regionKey] || regionKey;
      colorInputs[regionKey].value = modeColors[currentMode][regionKey];
    });
    const state = getActiveState();
    const zoomPct = Math.round((state.hasImage ? state.scale : 1) * 100);
    zoomDisplay.textContent = `${zoomPct}%`;
    zoomSlider.value = zoomPct;
    noImagePlaceholder.style.display = 'none';
    editWrapper.classList.toggle('draggable', !!state.hasImage);
  }

  function updateAll() {
    updateUI();
    renderToContext(editCtx, true, true);
  }

  function openImporter(regionKey = null) {
    pendingImportRegion = regionKey || activeRegion;
    fileInput.click();
  }

  function loadFileInto(file, regionKey = null) {
    if (!file || !file.type.match(/image\//)) {
      showToast('请选择图片文件');
      return;
    }
    const reader = new FileReader();
    reader.onload = event => {
      const img = new Image();
      img.onload = () => {
        const targetRegion = regionKey || pendingImportRegion || activeRegion;
        activeRegion = targetRegion;
        setStateImage(statesByMode[currentMode][targetRegion], img, getRegionDef(targetRegion).bounds);
        pendingImportRegion = null;
        updateAll();
        showToast(`图片已导入到${getActiveLabel(targetRegion)}`);
      };
      img.onerror = () => showToast('图片加载失败');
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  }

  function getCanvasPos(event) {
    const rect = editCanvas.getBoundingClientRect();
    return {
      x: (event.clientX - rect.left) * CANVAS_SIZE / rect.width,
      y: (event.clientY - rect.top) * CANVAS_SIZE / rect.height
    };
  }

  editCanvas.addEventListener('mousemove', event => {
    if (isDragging) return;
    const pos = getCanvasPos(event);
    const regionKey = regionAt(pos.x, pos.y);
    editWrapper.style.cursor = (regionKey && statesByMode[currentMode][regionKey].hasImage) ? 'grab' : 'default';
  });

  editCanvas.addEventListener('mousedown', event => {
    if (event.button !== 0) return;
    const pos = getCanvasPos(event);
    const regionKey = regionAt(pos.x, pos.y);
    if (!regionKey) return;
    if (regionKey !== activeRegion) {
      activeRegion = regionKey;
      updateAll();
      showToast(`当前编辑：${getActiveLabel(regionKey)}`);
      return;
    }
    const state = statesByMode[currentMode][regionKey];
    if (!state.hasImage) {
      openImporter(regionKey);
      return;
    }
    event.preventDefault();
    isDragging = true;
    dragRegion = regionKey;
    dragStartX = pos.x;
    dragStartY = pos.y;
    dragStartTx = state.tx;
    dragStartTy = state.ty;
    editWrapper.classList.add('dragging');
    editCheckerboard.classList.add('dragging');
    document.body.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', event => {
    if (!isDragging || !dragRegion) return;
    const pos = getCanvasPos(event);
    const state = statesByMode[currentMode][dragRegion];
    const area = getRegionDef(dragRegion).bounds;
    state.tx = dragStartTx + (pos.x - dragStartX);
    state.ty = dragStartTy + (pos.y - dragStartY);
    clampState(state, area);
    updateAll();
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    dragRegion = null;
    editWrapper.classList.remove('dragging');
    editCheckerboard.classList.remove('dragging');
    document.body.style.cursor = '';
  });

  editCanvas.addEventListener('wheel', event => {
    const state = getActiveState();
    if (!state.hasImage) return;
    const pos = getCanvasPos(event);
    if (!pointInRegion(pos.x, pos.y, activeRegion)) return;
    event.preventDefault();
    const oldScale = state.scale;
    const factor = (-event.deltaY > 0) ? 1.08 : 1 / 1.08;
    state.scale = Math.max(0.05, Math.min(20, state.scale * factor));
    const ix = (pos.x - state.tx) / oldScale;
    const iy = (pos.y - state.ty) / oldScale;
    state.tx = pos.x - ix * state.scale;
    state.ty = pos.y - iy * state.scale;
    clampState(state, getActiveArea());
    updateAll();
  }, { passive: false });

  function moveBy(dx, dy) {
    const state = getActiveState();
    if (!state.hasImage) return;
    state.tx += dx;
    state.ty += dy;
    clampState(state, getActiveArea());
    updateAll();
  }

  function bindNudgeButton(id, dx, dy) {
    const button = document.getElementById(id);
    let holdTimer = null;
    let repeatTimer = null;
    const clearTimers = () => {
      clearTimeout(holdTimer);
      clearInterval(repeatTimer);
      holdTimer = null;
      repeatTimer = null;
    };
    button.addEventListener('pointerdown', event => {
      if (!getActiveState().hasImage) return;
      event.preventDefault();
      const step = event.shiftKey ? 10 : 1;
      moveBy(dx * step, dy * step);
      clearTimers();
      holdTimer = setTimeout(() => {
        repeatTimer = setInterval(() => moveBy(dx * step, dy * step), 45);
      }, 260);
    });
    ['pointerup', 'pointerleave', 'pointercancel'].forEach(name => button.addEventListener(name, clearTimers));
  }

  bindNudgeButton('btnGlobalNudgeUp', 0, -1);
  bindNudgeButton('btnGlobalNudgeDown', 0, 1);
  bindNudgeButton('btnGlobalNudgeLeft', -1, 0);
  bindNudgeButton('btnGlobalNudgeRight', 1, 0);

  function updateScale(nextScale) {
    const state = getActiveState();
    if (!state.hasImage) return;
    const area = getActiveArea();
    const cx = area.x + area.w / 2;
    const cy = area.y + area.h / 2;
    const oldScale = state.scale;
    state.scale = Math.max(0.05, Math.min(20, nextScale));
    const ix = (cx - state.tx) / oldScale;
    const iy = (cy - state.ty) / oldScale;
    state.tx = cx - ix * state.scale;
    state.ty = cy - iy * state.scale;
    clampState(state, area);
    updateAll();
  }

  zoomSlider.addEventListener('input', () => updateScale(parseInt(zoomSlider.value, 10) / 100));
  document.getElementById('btnZoomIn').addEventListener('click', () => updateScale(getActiveState().scale + 0.01));
  document.getElementById('btnZoomOut').addEventListener('click', () => updateScale(getActiveState().scale - 0.01));
  document.getElementById('btnFit').addEventListener('click', () => {
    const state = getActiveState();
    const area = getActiveArea();
    if (!state.hasImage) return;
    state.scale = state.fitScale;
    state.tx = area.x + (area.w - state.image.naturalWidth * state.scale) / 2;
    state.ty = area.y + (area.h - state.image.naturalHeight * state.scale) / 2;
    updateAll();
  });
  document.getElementById('btnFill').addEventListener('click', () => {
    const state = getActiveState();
    const area = getActiveArea();
    if (!state.hasImage) return;
    state.scale = state.fillScale;
    state.tx = area.x + (area.w - state.image.naturalWidth * state.scale) / 2;
    state.ty = area.y + (area.h - state.image.naturalHeight * state.scale) / 2;
    updateAll();
  });
  document.getElementById('btnActualSize').addEventListener('click', () => updateScale(1));
  document.getElementById('btnReset').addEventListener('click', () => {
    const state = getActiveState();
    const area = getActiveArea();
    if (!state.hasImage) return;
    state.tx = area.x + (area.w - state.image.naturalWidth * state.scale) / 2;
    state.ty = area.y + (area.h - state.image.naturalHeight * state.scale) / 2;
    clampState(state, area);
    updateAll();
  });

  function exportPNG() {
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = CANVAS_SIZE;
    exportCanvas.height = CANVAS_SIZE;
    const ctx = exportCanvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    renderToContext(ctx, true, false);
    exportCanvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${cfg().filePrefix}-${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19)}.png`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast(`PNG 已导出 (${currentFullName()})`);
    }, 'image/png');
  }

  document.getElementById('btnImport').addEventListener('click', () => openImporter());
  document.getElementById('btnExport').addEventListener('click', exportPNG);
  fileInput.addEventListener('change', () => {
    if (fileInput.files && fileInput.files.length > 0) {
      loadFileInto(fileInput.files[0], pendingImportRegion);
      fileInput.value = '';
    }
  });

  Object.keys(colorInputs).forEach(regionKey => {
    colorInputs[regionKey].addEventListener('input', () => {
      modeColors[currentMode][regionKey] = colorInputs[regionKey].value;
      updateAll();
    });
  });

  function bindFilter(slider, valueEl, setter) {
    slider.addEventListener('input', () => {
      setter(parseInt(slider.value, 10));
      valueEl.textContent = `${slider.value}%`;
      updateAll();
    });
  }
  bindFilter(filterInputs.brightness, filterValues.brightness, value => filterBrightness = value);
  bindFilter(filterInputs.contrast, filterValues.contrast, value => filterContrast = value);
  bindFilter(filterInputs.saturation, filterValues.saturation, value => filterSaturation = value);
  document.querySelectorAll('.filter-step[data-target]').forEach(button => {
    button.addEventListener('click', () => {
      const slider = document.getElementById(button.dataset.target);
      const valueEl = document.getElementById(button.dataset.val);
      const delta = parseInt(button.dataset.delta, 10);
      const nextValue = Math.max(parseInt(slider.min, 10), Math.min(parseInt(slider.max, 10), parseInt(slider.value, 10) + delta));
      slider.value = nextValue;
      valueEl.textContent = `${nextValue}%`;
      if (slider === filterInputs.brightness) filterBrightness = nextValue;
      if (slider === filterInputs.contrast) filterContrast = nextValue;
      if (slider === filterInputs.saturation) filterSaturation = nextValue;
      updateAll();
    });
  });

  document.addEventListener('keydown', event => {
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
      event.preventDefault();
      exportPNG();
    }
  });

  updateAll();
})();
</script>
</body>
</html>
